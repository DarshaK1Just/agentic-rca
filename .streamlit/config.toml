# ─────────────────────────────────────────────────────────────────────────────
# Streamlit Configuration for RCA Engine
# Optimized for both local and Streamlit Cloud deployments
# ─────────────────────────────────────────────────────────────────────────────

[theme]
base = "dark"
primaryColor = "#F43F5E"
backgroundColor = "#0A0E1A"
secondaryBackgroundColor = "#121A2E"
textColor = "#E8ECF6"
font = "sans serif"

[server]
headless = true
maxUploadSize = 200
enableXsrfProtection = true

[client]
showErrorDetails = false
toolbarMode = "minimal"

[logger]
level = "error"

[browser]
gatherUsageStats = false
serverAddress = "localhost"
